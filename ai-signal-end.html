<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=720">
<title>AI Signal Bot — Thanks for Watching</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #0a0b0e;
    font-family: 'Inter', -apple-system, sans-serif;
    color: #e2e5ea;
  }

  .canvas {
    width: 1280px;
    height: 720px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Subtle grid background */
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* Glow accents */
  .glow-1 {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(239,68,68,0.06) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    filter: blur(80px);
  }

  .glow-2 {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(74,222,128,0.04) 0%, transparent 70%);
    bottom: -100px;
    left: 50%;
    transform: translateX(-50%);
    filter: blur(80px);
  }

  /* Center content */
  .center {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  .orb {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    position: relative;
  }

  /* Outer ring */
  .orb-outer {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: #1e293b;
  }

  /* Inner gradient ring */
  .orb-mid {
    position: absolute;
    inset: 8px;
    border-radius: 50%;
    background: linear-gradient(to bottom right, #475569, #1e293b);
  }

  /* Colored center */
  .orb-core {
    position: absolute;
    inset: 16px;
    border-radius: 50%;
    background: #f87171;
    opacity: 0.6;
  }

  /* Spinning ring */
  .orb-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid rgba(71,85,105,0.3);
    animation: spin 12s linear infinite;
  }

  .orb-ring::after {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(148,163,184,0.6);
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .thanks {
    font-size: 48px;
    font-weight: 800;
    letter-spacing: -1px;
    color: #fff;
    text-align: center;
  }

  .thanks span {
    background: linear-gradient(135deg, #f87171 0%, #fb923c 50%, #fbbf24 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: #64748b;
    letter-spacing: 0.5px;
    text-align: center;
    line-height: 1.6;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 18px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 100px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #94a3b8;
  }

  .badge .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 8px rgba(74,222,128,0.6);
  }

  .links {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: #475569;
  }

  .links a {
    color: #94a3b8;
    text-decoration: none;
  }

  .links .sep {
    color: #334155;
  }

  /* Decorative chart lines */
  .chart-lines {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 180px;
    opacity: 0.04;
    z-index: 1;
  }

  .chart-lines svg {
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="grid-bg"></div>
  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <!-- Decorative chart -->
  <div class="chart-lines">
    <svg viewBox="0 0 1280 180" preserveAspectRatio="none">
      <polyline fill="none" stroke="#fff" stroke-width="1.5"
        points="0,140 60,130 120,120 180,125 240,90 300,95 360,70 420,80 480,60 540,75 600,50 660,65 720,40 780,55 840,35 900,50 960,30 1020,45 1080,25 1140,40 1200,20 1280,30" />
    </svg>
  </div>

  <div class="center">
    <div class="orb">
      <div class="orb-outer"></div>
      <div class="orb-mid"></div>
      <div class="orb-core"></div>
      <div class="orb-ring"></div>
    </div>

    <div class="thanks">Thanks for <span>Watching</span></div>

  </div>
</div>
</body>
</html>
